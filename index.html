<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Assistant</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #eef5ee;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.header {
  text-align: center;
  font-size: 22px;
  font-weight: bold;
  color: green;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

label {
  font-weight: 600;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  cursor: pointer;
}

button:active {
  transform: scale(0.98);
}

.result-card {
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-top: 10px;
  border-left: 5px solid green;
}
</style>
</head>

<body>

<div class="container">

<div class="header">🌿 Farm Assistant</div>

<div class="card">
  <label>🔘 Select Type</label>
  <select id="type" onchange="updateProblems()">
    <option value="Pest">Pest</option>
    <option value="Nutrition">Fertilizer</option>
  </select>
</div>

<div class="card">
  <label>🌿 Stage</label>
  <select id="stage">
    <option>Buds</option>
    <option>Flowering</option>
    <option>Medium Size</option>
  </select>
</div>

<div class="card">
  <label>🌱 Condition</label>
  <select id="condition">
    <option>Healthy</option>
    <option>Normal</option>
    <option>Weak</option>
  </select>
</div>

<div class="card">
  <label>🐛 Select Problems (hold Ctrl/Cmd)</label>
  <select id="problems" multiple size="6"></select>
</div>

<button onclick="getSolution()">Get Recommendation</button>

<div id="result"></div>

</div>

<script>
let dataset = [];

// Load JSON safely
fetch("data.json")
  .then(res => res.json())
  .then(data => {
    dataset = data;
    updateProblems();
  })
  .catch(err => {
    document.getElementById("result").innerHTML =
      "❌ Failed to load data.json (Use Live Server)";
  });

// Update problem list based on type
function updateProblems() {
  let type = document.getElementById("type").value;

  let problems = [...new Set(
    dataset
      .filter(item => item.group === type)
      .map(item => item.problem)
  )];

  let select = document.getElementById("problems");
  select.innerHTML = "";

  problems.forEach(p => {
    let option = document.createElement("option");
    option.value = p;
    option.textContent = p;
    select.appendChild(option);
  });
}

// Get solution
function getSolution() {
  let type = document.getElementById("type").value;
  let stage = document.getElementById("stage").value;
  let condition = document.getElementById("condition").value;

  let selectedProblems = Array.from(
    document.getElementById("problems").selectedOptions
  ).map(opt => opt.value);

  if (selectedProblems.length === 0) {
    document.getElementById("result").innerHTML =
      "⚠ Please select at least one problem";
    return;
  }

  let results = dataset.filter(item =>
    item.group === type &&
    selectedProblems.includes(item.problem) &&
    (item.stage === stage || item.stage === "Any") &&
    item.condition === condition
  );

  let output = "";

  if (results.length === 0) {
    output = "❌ No matching solution found";
  } else {
    results.forEach(r => {
      output += `
        <div class="result-card">
          <b>🌿 ${r.problem}</b><br><br>
          🧪 <b>Solution:</b> ${r.solution}<br>
          🔁 <b>Alternative:</b> ${r.alternative}<br>
          📦 <b>Dose:</b> ${r.dose_250L}<br><br>
          📖 ${r.uses}
        </div>
      `;
    });
  }

  document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
