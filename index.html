<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Assistant</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #e8f5e9, #f4fbf4);
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 15px;
}

.header {
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  color: #1b5e20;
  margin-bottom: 20px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

label {
  font-weight: 600;
  font-size: 14px;
}

select {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, #43a047, #2e7d32);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 16px;
}

.result-card {
  background: white;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
  border-left: 5px solid #2e7d32;
}
</style>
</head>

<body>

<div class="container">

<div class="header">🌿 Smart Rythu Assistant</div>

<div class="card">
  <label>🔘 Type select cheyandi</label>
  <select id="type" onchange="updateProblems()">
    <option value="">-- Type select cheyandi --</option>
    <option value="Pest">Pest (Purugulu)</option>
    <option value="Nutrition">Fertilizer (Poshakam)</option>
  </select>
</div>

<div class="card">
  <label>🐛 Problem select cheyandi</label>
  <select id="problems" multiple size="6"></select>
</div>

<div class="card">
  <label>🌿 Stage (Stage select cheyandi)</label>
  <select id="stage">
    <option value="">-- Stage select cheyandi --</option>
    <option>Buds (Bud stage)</option>
    <option>Flowering (Poolu stage)</option>
    <option>Medium Size (Madhya size)</option>
  </select>
</div>

<div class="card">
  <label>🌱 Chettu condition</label>
  <select id="condition">
    <option value="">-- Condition select cheyandi --</option>
    <option>Healthy (Baagundi)</option>
    <option>Normal (Sadharanam)</option>
    <option>Weak (Balheena)</option>
  </select>
</div>

<button onclick="getSolution()">Solution chupinchandi</button>

<div id="result"></div>

</div>

<script>
let dataset = [];

fetch("./data.json")
  .then(res => res.json())
  .then(data => {
    dataset = data;
  });

// Update problems
function updateProblems() {
  let type = document.getElementById("type").value;

  let problems = [...new Set(
    dataset
      .filter(item => item.group === type)
      .map(item => item.problem)
  )];

  let select = document.getElementById("problems");
  select.innerHTML = "";

  problems.forEach(p => {
    let option = document.createElement("option");
    option.value = p;
    option.textContent = p;
    select.appendChild(option);
  });
}

// Get solution
function getSolution() {
  let type = document.getElementById("type").value;
  let stage = document.getElementById("stage").value;
  let condition = document.getElementById("condition").value;

  let selectedProblems = Array.from(
    document.getElementById("problems").selectedOptions
  ).map(opt => opt.value);

  if (!type || !stage || !condition) {
    document.getElementById("result").innerHTML =
      "⚠ Dayachesi anni fields fill cheyandi";
    return;
  }

  if (selectedProblems.length === 0) {
    document.getElementById("result").innerHTML =
      "⚠ Dayachesi problem select cheyandi";
    return;
  }

  let results = dataset.filter(item =>
    item.group === type &&
    selectedProblems.includes(item.problem) &&
    (item.stage === stage || item.stage === "Any") &&
    item.condition === condition
  );

  let output = "";

  if (results.length === 0) {
    output = "❌ Matching solution dorakaledu";
  } else {
    results.forEach(r => {
      output += `
        <div class="result-card">
          <b>🌿 Problem: ${r.problem}</b><br><br>
          🧪 <b>Use cheyali:</b> ${r.solution}<br>
          🔁 <b>Alternative:</b> ${r.alternative}<br>
          📦 <b>Dose (250L):</b> ${r.dose_250L}<br><br>
          📖 ${r.uses}
        </div>
      `;
    });
  }

  document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
